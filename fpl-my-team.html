<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My FPL Team — Nosky</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ---- Team ID form ---- */
    .team-form {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .team-id-input {
      background: transparent;
      border: 1px solid var(--cerulean);
      color: var(--text);
      padding: 0.4rem 0.75rem;
      border-radius: 4px;
      font-size: 0.9rem;
      width: 160px;
      outline: none;
      transition: border-color 0.12s;
      /* Remove browser spinner arrows on number inputs */
      -moz-appearance: textfield;
    }

    .team-id-input::-webkit-outer-spin-button,
    .team-id-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    .team-id-input::placeholder {
      color: var(--text-muted);
    }

    .team-id-input:focus {
      border-color: var(--cerulean-light);
    }

    .load-btn {
      background: var(--cerulean);
      border: none;
      color: #fff;
      padding: 0.4rem 1rem;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.12s;
    }

    .load-btn:hover {
      opacity: 0.85;
    }

    .load-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ---- Budget input ---- */
    .form-sep {
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 0 0.1rem;
    }

    .budget-input {
      background: transparent;
      border: 1px solid var(--cerulean);
      color: var(--text);
      padding: 0.4rem 0.5rem;
      border-radius: 4px;
      font-size: 0.9rem;
      width: 72px;
      outline: none;
      transition: border-color 0.12s;
      -moz-appearance: textfield;
      text-align: right;
    }

    .budget-input::-webkit-outer-spin-button,
    .budget-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    .budget-input::placeholder {
      color: var(--text-muted);
    }

    .budget-input:focus {
      border-color: var(--cerulean-light);
    }

    /* ---- Two-column layout ---- */
    .fpl-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
      align-items: start;
    }

    @media (max-width: 820px) {
      .fpl-columns {
        grid-template-columns: 1fr;
      }
    }

    /* ---- Transfer helper ---- */
    .transfer-section h2 {
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--cerulean-light);
      margin-bottom: 1rem;
    }

    /* Upgrade cell content stacks name above pts/price */
    .upgrade-cell {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .upgrade-name {
      font-weight: 600;
      color: var(--text);
    }

    .upgrade-meta {
      display: flex;
      gap: 0.5rem;
      align-items: baseline;
    }

    .upgrade-pts {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--yellow);
    }

    .upgrade-price {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .no-upgrade {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .pos-tag {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ---- Team summary strip ---- */
    .team-summary {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      padding: 1rem 1.25rem;
      background: var(--bg-surface);
      border-radius: 6px;
      border-left: 3px solid var(--cerulean);
    }

    .summary-item {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .summary-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .summary-value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .summary-value.pts {
      color: var(--yellow);
    }

    /* ---- Squad tables ---- */
    .squad-section {
      margin-bottom: 2rem;
    }

    .squad-section h3 {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }

    .table-scroll {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      background-color: var(--bg-surface);
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.75rem;
      padding: 0.6rem 0.9rem;
      text-align: left;
      border-bottom: 2px solid var(--cerulean);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid #1a3d3d;
      transition: background-color 0.1s ease;
    }

    tbody tr:hover {
      background-color: var(--bg-surface);
    }

    tbody td {
      padding: 0.55rem 0.9rem;
      color: var(--text);
      white-space: nowrap;
    }

    td.pts {
      color: var(--yellow);
      font-weight: 700;
    }

    .captain-badge {
      display: inline-block;
      margin-left: 0.4em;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--yellow);
    }

    /* ---- Loading / error states ---- */
    .status-message {
      padding: 3rem 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .status-message.error {
      color: #e07070;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="site-name">
      <img src="cyber%20badger%20logo.png" alt="" class="site-logo" />
      Nosky
    </a>

    <nav class="site-nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <div class="nav-dropdown">
        <button class="nav-dropdown-trigger" aria-expanded="false" aria-haspopup="true">SPAL ▾</button>
        <div class="nav-dropdown-panel">
          <a href="/spal/standings">View League</a>
          <a href="/spal/login">Manager Login</a>
        </div>
      </div>
      <a href="games.html">Games</a>
      <a href="music.html">Music</a>
      <a href="apps.html">Apps</a>
      <div class="nav-dropdown">
        <button class="nav-dropdown-trigger" aria-expanded="false" aria-haspopup="true">FPL ▾</button>
        <div class="nav-dropdown-panel">
          <a href="fpl.html">Players</a>
          <a href="fpl-my-team.html">My Team</a>
        </div>
      </div>
      <a href="cyber.html">Cyber</a>
    </nav>
  </header>

  <main>

    <section class="hero">
      <h1 class="hero-title">My FPL Team</h1>
      <p class="hero-description">Enter your FPL team ID to view your current squad. You can find it in the URL when you visit your team on the FPL website — it's the number after <code>/entry/</code>.</p>
    </section>

    <section>
      <div class="team-form">
        <input
          class="team-id-input"
          id="team-id-input"
          type="number"
          min="1"
          placeholder="e.g. 1234567"
          autocomplete="off"
        />
        <span class="form-sep">Budget £</span>
        <input
          class="budget-input"
          id="budget-input"
          type="number"
          min="0"
          step="0.1"
          placeholder="0.0"
          autocomplete="off"
        />
        <span class="form-sep">m</span>
        <button class="load-btn" id="load-btn">Load team</button>
      </div>

      <div id="team-output"></div>
    </section>

  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Nosky. All rights reserved.</p>
  </footer>

  <script src="nav.js"></script>
  <script>
    document.getElementById("load-btn").addEventListener("click", loadTeam);

    document.getElementById("team-id-input").addEventListener("keydown", function (e) {
      if (e.key === "Enter") loadTeam();
    });

    async function loadTeam() {
      const input  = document.getElementById("team-id-input");
      const output = document.getElementById("team-output");
      const btn    = document.getElementById("load-btn");

      const teamId = input.value.trim();

      if (!teamId || isNaN(teamId) || Number(teamId) < 1) {
        output.innerHTML = `<p class="status-message error">Please enter a valid team ID.</p>`;
        return;
      }

      // Budget in millions → integer tenths for price comparison (e.g. 0.5m → 5)
      const budgetTenths = Math.round((parseFloat(document.getElementById("budget-input").value) || 0) * 10);

      btn.disabled = true;
      output.innerHTML = `<p class="status-message">Loading team data…</p>`;

      try {
        // Fetch team picks and full player list in parallel
        const [teamRes, bootstrapRes] = await Promise.all([
          fetch(`/.netlify/functions/fpl-team?team_id=${encodeURIComponent(teamId)}`),
          fetch("/.netlify/functions/fpl"),
        ]);

        const teamData      = await teamRes.json();
        const bootstrapData = await bootstrapRes.json();

        if (!teamRes.ok) throw new Error(teamData.error ?? `Server returned ${teamRes.status}`);
        if (!bootstrapRes.ok) throw new Error("Could not load player data for transfer helper");

        output.innerHTML = buildOutput(teamData, bootstrapData, budgetTenths);

      } catch (err) {
        output.innerHTML = `<p class="status-message error">${escHtml(err.message)}</p>`;
      } finally {
        btn.disabled = false;
      }
    }

    function buildOutput({ teamInfo, gameweek, picks }, bootstrap, budgetTenths) {
      // Index all FPL players by position for fast upgrade lookups
      const byPosition = {};
      for (const p of bootstrap.elements) {
        if (!byPosition[p.element_type]) byPosition[p.element_type] = [];
        byPosition[p.element_type].push(p);
      }
      // Pre-sort each position group by total_points desc once, not per player
      for (const pos of Object.values(byPosition)) {
        pos.sort((a, b) => b.total_points - a.total_points);
      }

      // Squad element IDs used to exclude current players from upgrade suggestions
      const squadIds = new Set(picks.map(p => p.element_id));

      const starters = picks.filter(p => p.position <= 11);
      const bench    = picks.filter(p => p.position > 11);

      return `
        <div class="team-summary">
          <div class="summary-item">
            <span class="summary-label">Team</span>
            <span class="summary-value">${escHtml(teamInfo.name)}</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Manager</span>
            <span class="summary-value">${escHtml(teamInfo.manager)}</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">GW${gameweek} Points</span>
            <span class="summary-value pts">${teamInfo.gameweek_points ?? "—"}</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">GW${gameweek} Rank</span>
            <span class="summary-value">${teamInfo.gameweek_rank?.toLocaleString() ?? "—"}</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Overall Points</span>
            <span class="summary-value pts">${teamInfo.overall_points ?? "—"}</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Overall Rank</span>
            <span class="summary-value">${teamInfo.overall_rank?.toLocaleString() ?? "—"}</span>
          </div>
        </div>

        <div class="fpl-columns">
          <div>
            <div class="squad-section">
              <h3>Starting XI</h3>
              ${buildSquadTable(starters)}
            </div>
            <div class="squad-section">
              <h3>Bench</h3>
              ${buildSquadTable(bench)}
            </div>
          </div>
          <div class="transfer-section">
            <h2>Transfer Helper</h2>
            ${buildTransferTable(picks, byPosition, squadIds, budgetTenths)}
          </div>
        </div>`;
    }

    function buildTransferTable(picks, byPosition, squadIds, budgetTenths) {
      // Track assigned players per column so the same player doesn't appear
      // in more than one row. The two sets are independent — a player can
      // feature in the overall column for one pick and the affordable column
      // for another, since those represent different transfer scenarios.
      const usedOverall    = new Set();
      const usedAffordable = new Set();

      const rows = picks.map(pick => {
        // All players in the same position who are not already in the squad,
        // already sorted by total_points desc
        const candidates = (byPosition[pick.element_type] ?? [])
          .filter(p => !squadIds.has(p.id));

        const bestOverall = candidates.find(
          p => p.total_points > pick.total_points && !usedOverall.has(p.id)
        ) ?? null;
        if (bestOverall) usedOverall.add(bestOverall.id);

        const maxCost        = pick.price_raw + budgetTenths;
        const bestAffordable = candidates.find(
          p => p.total_points > pick.total_points && p.now_cost <= maxCost && !usedAffordable.has(p.id)
        ) ?? null;
        if (bestAffordable) usedAffordable.add(bestAffordable.id);

        return `<tr>
          <td>
            <div class="upgrade-cell">
              <span class="upgrade-name">${escHtml(pick.name)}</span>
              <span class="upgrade-meta">
                <span class="upgrade-price">${escHtml(pick.price)}</span>
                <span class="pos-tag">${escHtml(pick.pos)}</span>
              </span>
            </div>
          </td>
          <td>${upgradeCell(bestOverall)}</td>
          <td>${upgradeCell(bestAffordable)}</td>
        </tr>`;
      }).join("");

      return `<div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Your Player</th>
              <th>Best Overall</th>
              <th>Best Affordable</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }

    function upgradeCell(player) {
      if (!player) return `<span class="no-upgrade">—</span>`;

      const name  = `${player.first_name} ${player.second_name}`;
      const price = `£${(player.now_cost / 10).toFixed(1)}m`;

      return `<div class="upgrade-cell">
        <span class="upgrade-name">${escHtml(name)}</span>
        <span class="upgrade-meta">
          <span class="upgrade-pts">${player.total_points}pts</span>
          <span class="upgrade-price">${escHtml(price)}</span>
        </span>
      </div>`;
    }

    function buildSquadTable(picks) {
      const rows = picks.map(p => {
        const badge = p.is_captain
          ? `<span class="captain-badge">(C)</span>`
          : p.is_vice_captain
          ? `<span class="captain-badge">(VC)</span>`
          : "";
        return `<tr>
          <td>${escHtml(p.name)}${badge}</td>
          <td>${escHtml(p.team)}</td>
          <td>${escHtml(p.pos)}</td>
          <td>${escHtml(p.price)}</td>
          <td class="pts">${p.total_points}</td>
        </tr>`;
      }).join("");

      return `<div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Player</th>
              <th>Team</th>
              <th>Pos</th>
              <th>Price</th>
              <th>Total Pts</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }

    // Minimal HTML escaping — keeps user-supplied input and API data safe
    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>

</body>
</html>

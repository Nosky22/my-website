<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FPL Tool — Nosky</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ---- Player table ---- */
    .player-table-section {
      margin-top: 2.5rem;
    }

    .player-table-section h2 {
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--cerulean-light);
      margin-bottom: 1rem;
    }

    /* Wrap the table so it scrolls horizontally on narrow screens
       without breaking the page layout */
    .table-scroll {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      background-color: var(--bg-surface);
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.75rem;
      padding: 0.6rem 0.9rem;
      text-align: left;
      border-bottom: 2px solid var(--cerulean);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid #1a3d3d;
      transition: background-color 0.1s ease;
    }

    tbody tr:hover {
      background-color: var(--bg-surface);
    }

    tbody td {
      padding: 0.55rem 0.9rem;
      color: var(--text);
      white-space: nowrap;
    }

    /* Highlight the points column so it reads as the key stat */
    td.pts {
      color: var(--yellow);
      font-weight: 700;
    }

    /* ---- Loading / error states ---- */
    .status-message {
      padding: 3rem 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .status-message.error {
      color: #e07070;
    }

    /* ---- Filter bar ---- */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .pos-filters {
      display: flex;
      gap: 0.35rem;
    }

    /* Base style shared by position toggle buttons */
    .pos-btn {
      background: transparent;
      border: 1px solid var(--cerulean);
      color: var(--cerulean-light);
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background-color 0.12s, color 0.12s;
    }

    .pos-btn:hover {
      background: rgba(32, 178, 170, 0.15);
    }

    /* Applied to individual position buttons when selected, and to
       the All button when no positions are selected */
    .pos-btn.active {
      background: var(--cerulean);
      color: #fff;
    }

    /* ---- Team dropdown ---- */
    .team-dropdown {
      position: relative;
    }

    .team-dropdown-btn {
      background: transparent;
      border: 1px solid var(--cerulean);
      color: var(--cerulean-light);
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.12s, color 0.12s;
      white-space: nowrap;
    }

    .team-dropdown-btn:hover {
      background: rgba(32, 178, 170, 0.15);
    }

    /* Filled when one or more teams are selected */
    .team-dropdown-btn.has-selection {
      background: var(--cerulean);
      color: #fff;
    }

    .team-dropdown-panel {
      /* Hidden by default; .open switches it to a 2-column grid */
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: var(--bg-surface);
      border: 1px solid var(--cerulean);
      border-radius: 4px;
      padding: 0.4rem;
      z-index: 100;
      min-width: 150px;
      max-height: 300px;
      overflow-y: auto;
    }

    .team-dropdown-panel.open {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.05rem;
    }

    .team-checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.4rem;
      border-radius: 3px;
      font-size: 0.8rem;
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }

    .team-checkbox-label:hover {
      background: rgba(32, 178, 170, 0.15);
    }

    .team-checkbox-label input[type="checkbox"] {
      accent-color: var(--cerulean);
      cursor: pointer;
    }

    /* ---- Sortable column headers ---- */
    thead th[data-sort] {
      cursor: pointer;
      user-select: none;
    }

    thead th[data-sort]:hover {
      color: var(--text);
    }

    /* Reserve space so header widths don't jump when the arrow appears */
    thead th[data-sort]::after {
      content: "";
      display: inline-block;
      min-width: 0.7em;
      margin-left: 0.3em;
    }

    thead th.sort-asc::after {
      content: "▲";
      color: var(--cerulean-light);
    }

    thead th.sort-desc::after {
      content: "▼";
      color: var(--cerulean-light);
    }

    /* ---- Name search input ---- */
    .name-search {
      background: transparent;
      border: 1px solid var(--cerulean);
      color: var(--text);
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      font-size: 0.8rem;
      width: 180px;
      outline: none;
      transition: border-color 0.12s;
    }

    .name-search::placeholder {
      color: var(--text-muted);
    }

    .name-search:focus {
      border-color: var(--cerulean-light);
    }

    /* ---- Clear filters ---- */
    .clear-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0.3rem 0.4rem;
      text-decoration: underline;
      margin-left: auto;
    }

    .clear-btn:hover {
      color: var(--text);
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="site-name">
      <img src="cyber%20badger%20logo.png" alt="" class="site-logo" />
      Nosky
    </a>

    <nav class="site-nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <div class="nav-dropdown">
        <button class="nav-dropdown-trigger" aria-expanded="false" aria-haspopup="true">SPAL ▾</button>
        <div class="nav-dropdown-panel">
          <a href="/spal/standings">View League</a>
          <a href="/spal/login">Manager Login</a>
        </div>
      </div>
      <a href="games.html">Games</a>
      <a href="music.html">Music</a>
      <a href="apps.html">Apps</a>
      <div class="nav-dropdown">
        <button class="nav-dropdown-trigger" aria-expanded="false" aria-haspopup="true">FPL ▾</button>
        <div class="nav-dropdown-panel">
          <a href="fpl.html">Players</a>
          <a href="fpl-my-team.html">My Team</a>
        </div>
      </div>
      <a href="cyber.html">Cyber</a>
    </nav>
  </header>

  <main>

    <section class="hero">
      <h1 class="hero-title">FPL Tool</h1>
      <p class="hero-description">Data-driven help for Fantasy Premier League — player stats, transfer analysis, and team selection.</p>
    </section>

    <section class="player-table-section">
      <h2>All Players</h2>

      <!-- This div is replaced by either the table or an error message -->
      <div id="player-output">
        <p class="status-message" id="loading-msg">Loading player data...</p>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Nosky. All rights reserved.</p>
  </footer>

  <script src="nav.js"></script>
  <script>
    // Position IDs from the FPL API: 1=GKP, 2=DEF, 3=MID, 4=FWD
    const POSITION_LABELS = { 1: "GKP", 2: "DEF", 3: "MID", 4: "FWD" };

    // Kept at module scope so filter/sort functions can read them without re-fetching
    let allPlayers = [];
    let teamMap = {};

    // Active filter sets — empty means "show all" for that dimension
    const activePositions = new Set();
    const activeTeams = new Set();

    // Empty string means no name filter
    let nameQuery = "";

    // Sort state — pts desc matches the initial order from the API sort
    let sortColumn = "pts";
    let sortDir    = "desc";

    // When switching to a new column, default to this direction per column
    const DEFAULT_SORT_DIR = {
      name: "asc", team: "asc", pos: "asc",
      price: "desc", pts: "desc",
    };

    async function loadPlayers() {
      const output = document.getElementById("player-output");

      try {
        const res = await fetch("/.netlify/functions/fpl");

        if (!res.ok) {
          throw new Error(`Proxy returned ${res.status}`);
        }

        const data = await res.json();

        for (const team of data.teams) {
          teamMap[team.id] = team.short_name;
        }

        // Sort players by total_points descending so the most valuable
        // players appear at the top without any filter needed
        allPlayers = [...data.elements].sort(
          (a, b) => b.total_points - a.total_points
        );

        output.innerHTML = buildFilterBar(data.teams) + buildTable();
        renderRows();
        wireFilters();
        wireSortHeaders();
        syncSortHeaders();

      } catch (err) {
        output.innerHTML = `<p class="status-message error">
          Could not load player data — ${err.message}
        </p>`;
      }
    }

    function buildFilterBar(teams) {
      const sortedTeams = [...teams].sort((a, b) =>
        a.short_name.localeCompare(b.short_name)
      );

      const teamCheckboxes = sortedTeams.map((t) =>
        `<label class="team-checkbox-label">
          <input type="checkbox" value="${escHtml(t.short_name)}" />
          ${escHtml(t.short_name)}
        </label>`
      ).join("");

      return `
        <div class="filter-bar">
          <div class="pos-filters">
            <button class="pos-btn active" data-pos="ALL">All</button>
            <button class="pos-btn" data-pos="GKP">GK</button>
            <button class="pos-btn" data-pos="DEF">DEF</button>
            <button class="pos-btn" data-pos="MID">MID</button>
            <button class="pos-btn" data-pos="FWD">FWD</button>
          </div>
          <div class="team-dropdown">
            <button class="team-dropdown-btn" id="team-dropdown-btn">Teams ▾</button>
            <div class="team-dropdown-panel" id="team-dropdown-panel">
              ${teamCheckboxes}
            </div>
          </div>
          <input
            class="name-search"
            id="name-search"
            type="search"
            placeholder="Search player…"
            autocomplete="off"
          />
          <button class="clear-btn" id="clear-filters">Clear filters</button>
        </div>`;
    }

    function wireFilters() {
      const posButtons = document.querySelectorAll(".pos-btn");

      for (const btn of posButtons) {
        btn.addEventListener("click", () => {
          const pos = btn.dataset.pos;
          if (pos === "ALL") {
            activePositions.clear();
          } else {
            // Toggle this position in/out of the active set
            if (activePositions.has(pos)) {
              activePositions.delete(pos);
            } else {
              activePositions.add(pos);
            }
          }
          syncPosButtons();
          applyFilters();
        });
      }

      const dropdownBtn   = document.getElementById("team-dropdown-btn");
      const dropdownPanel = document.getElementById("team-dropdown-panel");

      dropdownBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        dropdownPanel.classList.toggle("open");
      });

      // Clicks inside the panel shouldn't bubble up and close it
      dropdownPanel.addEventListener("click", (e) => e.stopPropagation());

      document.addEventListener("click", () => {
        dropdownPanel.classList.remove("open");
      });

      const checkboxes = dropdownPanel.querySelectorAll("input[type='checkbox']");
      for (const cb of checkboxes) {
        cb.addEventListener("change", () => {
          if (cb.checked) {
            activeTeams.add(cb.value);
          } else {
            activeTeams.delete(cb.value);
          }
          syncTeamDropdownBtn();
          applyFilters();
        });
      }

      const nameSearch = document.getElementById("name-search");
      nameSearch.addEventListener("input", () => {
        nameQuery = nameSearch.value.trim().toLowerCase();
        applyFilters();
      });

      document.getElementById("clear-filters").addEventListener("click", () => {
        activePositions.clear();
        activeTeams.clear();
        nameQuery = "";
        nameSearch.value = "";
        for (const cb of checkboxes) cb.checked = false;
        syncPosButtons();
        syncTeamDropdownBtn();
        applyFilters();
      });
    }

    // Keep position button appearance in sync with activePositions
    function syncPosButtons() {
      for (const btn of document.querySelectorAll(".pos-btn")) {
        const pos = btn.dataset.pos;
        // All button is active when nothing is selected; others when in the set
        const isActive = pos === "ALL"
          ? activePositions.size === 0
          : activePositions.has(pos);
        btn.classList.toggle("active", isActive);
      }
    }

    // Update the dropdown button label and fill to reflect selection count
    function syncTeamDropdownBtn() {
      const btn = document.getElementById("team-dropdown-btn");
      const count = activeTeams.size;
      btn.textContent = count === 0 ? "Teams ▾" : `Teams (${count}) ▾`;
      btn.classList.toggle("has-selection", count > 0);
    }

    function applyFilters() {
      for (const row of document.querySelectorAll("#player-tbody tr")) {
        const posMatch  = activePositions.size === 0 || activePositions.has(row.dataset.position);
        const teamMatch = activeTeams.size === 0     || activeTeams.has(row.dataset.team);
        const nameMatch = nameQuery === ""            || row.dataset.name.includes(nameQuery);
        row.style.display = posMatch && teamMatch && nameMatch ? "" : "none";
      }
    }

    // Builds the table shell only — tbody is populated separately by renderRows()
    // so that both the initial load and subsequent sorts share the same code path
    function buildTable() {
      return `<div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th data-sort="name">Player</th>
              <th data-sort="team">Team</th>
              <th data-sort="pos">Pos</th>
              <th data-sort="price">Price</th>
              <th data-sort="pts">Total Pts</th>
            </tr>
          </thead>
          <tbody id="player-tbody"></tbody>
        </table>
      </div>`;
    }

    function renderRows() {
      // Build the rows first as a string array, then join — faster than
      // repeated innerHTML concatenation inside a loop
      const rows = getSortedPlayers().map((p) => {
        const name     = `${p.first_name} ${p.second_name}`;
        const team     = teamMap[p.team] ?? "—";
        const position = POSITION_LABELS[p.element_type] ?? "—";
        // FPL stores price as an integer (55 = £5.5m)
        const price    = `£${(p.now_cost / 10).toFixed(1)}m`;
        const pts      = p.total_points;

        const nameLower = name.toLowerCase();
        return `<tr data-position="${escHtml(position)}" data-team="${escHtml(team)}" data-name="${escHtml(nameLower)}">
          <td>${escHtml(name)}</td>
          <td>${escHtml(team)}</td>
          <td>${escHtml(position)}</td>
          <td>${escHtml(price)}</td>
          <td class="pts">${pts}</td>
        </tr>`;
      });

      document.getElementById("player-tbody").innerHTML = rows.join("");
      // Re-apply any active filters so hidden rows stay hidden after a re-sort
      applyFilters();
    }

    function getSortedPlayers() {
      return [...allPlayers].sort((a, b) => {
        let valA, valB;

        switch (sortColumn) {
          case "name":
            valA = `${a.first_name} ${a.second_name}`.toLowerCase();
            valB = `${b.first_name} ${b.second_name}`.toLowerCase();
            break;
          case "team":
            valA = (teamMap[a.team] ?? "").toLowerCase();
            valB = (teamMap[b.team] ?? "").toLowerCase();
            break;
          case "pos":
            valA = a.element_type;
            valB = b.element_type;
            break;
          case "price":
            valA = a.now_cost;
            valB = b.now_cost;
            break;
          case "pts":
          default:
            valA = a.total_points;
            valB = b.total_points;
        }

        if (valA < valB) return sortDir === "asc" ? -1 : 1;
        if (valA > valB) return sortDir === "asc" ? 1 : -1;
        return 0;
      });
    }

    function wireSortHeaders() {
      for (const th of document.querySelectorAll("thead th[data-sort]")) {
        th.addEventListener("click", () => {
          const col = th.dataset.sort;
          if (col === sortColumn) {
            sortDir = sortDir === "asc" ? "desc" : "asc";
          } else {
            sortColumn = col;
            sortDir = DEFAULT_SORT_DIR[col] ?? "asc";
          }
          syncSortHeaders();
          renderRows();
        });
      }
    }

    function syncSortHeaders() {
      for (const th of document.querySelectorAll("thead th[data-sort]")) {
        th.classList.remove("sort-asc", "sort-desc");
        if (th.dataset.sort === sortColumn) {
          th.classList.add(sortDir === "asc" ? "sort-asc" : "sort-desc");
        }
      }
    }

    // Minimal HTML escaping — FPL names shouldn't contain markup, but
    // we sanitise anyway so injected characters can't break the table
    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    loadPlayers();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Makes the page scale correctly on mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nosky</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =====================
       HEADER
       Contains the site name and main navigation.
       ===================== -->
  <header class="site-header">
    <!-- Site name with logo image.
         The image src uses %20 in place of spaces (URL encoding).
         alt="" is intentional — the image is decorative since the
         text "Nosky" already labels the link. -->
    <a href="index.html" class="site-name">
      <img src="cyber%20badger%20logo.png" alt="" class="site-logo" />
      Nosky
    </a>

    <!-- Primary navigation links -->
    <nav class="site-nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <div class="nav-dropdown">
        <button class="nav-dropdown-trigger" aria-expanded="false" aria-haspopup="true">SPAL ▾</button>
        <div class="nav-dropdown-panel">
          <a href="/spal/standings">View League</a>
          <a href="/spal/login">Manager Login</a>
        </div>
      </div>
      <a href="games.html">Games</a>
      <a href="music.html">Music</a>
      <a href="apps.html">Apps</a>
      <div class="nav-dropdown">
        <button class="nav-dropdown-trigger" aria-expanded="false" aria-haspopup="true">FPL ▾</button>
        <div class="nav-dropdown-panel">
          <a href="fpl.html">Players</a>
          <a href="fpl-my-team.html">My Team</a>
        </div>
      </div>
      <a href="cyber.html">Cyber</a>
    </nav>
  </header>

  <!-- =====================
       MAIN CONTENT
       All primary page content lives inside <main>.
       ===================== -->
  <main>

    <!-- HERO SECTION
         The first thing visitors see. A big title and a short description. -->
    <section class="hero">
      <h1 class="hero-title">Welcome</h1>
      <!-- Replace this line with a one-liner that describes your work -->
      <p class="hero-description">Games, music, and small web experiments — made by hand.</p>
    </section>

  </main>

  <!-- =====================
       FOOTER
       Sits at the bottom of every page.
       ===================== -->
  <footer class="site-footer">
    <!-- Update the year and name as needed -->
    <p>&copy; 2026 Nosky. All rights reserved.</p>
  </footer>

  <script src="nav.js"></script>
</body>
</html>
